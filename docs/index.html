<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>心旅ブログ | 公開ページ</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: #f4f6f8;
      min-height: 100vh;
    }

    .published-topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #d2d7de;
      background: #fff;
    }

    .published-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .published-brand-icon {
      display: block;
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }

    .published-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .published-updated {
      margin: 0;
      font-size: 12px;
      color: #4b5563;
    }

    .published-main {
      max-width: 980px;
      margin: 18px auto;
      padding: 0 14px 22px;
      display: grid;
      gap: 18px;
    }

    .tag-section {
      display: grid;
      gap: 10px;
    }

    .tag-heading {
      margin: 0;
      font-size: 19px;
      line-height: 1.3;
    }

    .post-list-grid {
      display: grid;
      gap: 12px;
    }

    .post-card {
      background: #fff;
      border: 1px solid #d2d7de;
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .post-card h3 {
      margin: 0;
      font-size: 23px;
      line-height: 1.35;
    }

    .post-card .meta {
      margin: 0;
      font-size: 13px;
      color: #6b7280;
    }

    .empty-state {
      background: #fff;
      border: 1px solid #d2d7de;
      border-radius: 8px;
      padding: 18px;
    }

    .empty-state p {
      margin: 0 0 10px;
    }
  </style>
</head>
<body>
  <header class="published-topbar">
    <h1 class="published-title"><img src="icon.svg" alt="" class="published-brand-icon" width="24" height="24">心旅ブログ</h1>
    <div class="published-meta">
      <p id="publishedUpdated" class="published-updated">最終更新: -</p>
    </div>
  </header>

  <main id="publishedRoot" class="published-main"></main>

  <script src="published.js"></script>
</body>
</html>
