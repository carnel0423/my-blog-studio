<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Blog Studio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1 class="brand">My Blog Studio</h1>
      <div class="toolbar">
        <button id="newPostBtn" class="btn" title="新規">＋ 新規</button>
        <button id="savePostBtn" class="btn primary" title="保存">💾 保存</button>
        <button id="deletePostBtn" class="btn danger" title="削除">🗑 削除</button>
        <button id="prePublishPreviewBtn" class="btn" title="公開前プレビュー">👁 公開前プレビュー</button>
        <button id="exportBtn" class="btn" title="JSON出力">⬇ JSON出力</button>
        <button id="importBtn" class="btn" title="JSON取込">⬆ JSON取込</button>
        <button id="publishedViewBtn" class="btn" title="公開ビュー">🌐 公開ビュー</button>
        <input id="importInput" type="file" accept=".json,application/json" hidden>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar">
        <label class="field-label" for="searchInput">投稿を検索</label>
        <input id="searchInput" class="input" type="search" placeholder="タイトル / タグ / 本文">
        <div class="sidebar-head">
          <h2>投稿一覧</h2>
        </div>
        <ul id="postList" class="post-list"></ul>
      </aside>

      <main class="editor">
        <section class="fields">
          <div class="field-row">
            <label class="field-label" for="titleInput">タイトル</label>
            <input id="titleInput" class="input" type="text" placeholder="例: 春の散歩ログ">
          </div>

          <div class="field-row">
            <label class="field-label" for="slugInput">スラッグ</label>
            <input id="slugInput" class="input mono" type="text" placeholder="haru-no-sanpo-log">
          </div>

          <div class="grid-2">
            <div class="field-row">
              <label class="field-label" for="statusInput">ステータス</label>
              <select id="statusInput" class="input">
                <option value="draft">下書き</option>
                <option value="published">公開</option>
              </select>
            </div>
            <div class="field-row">
              <label class="field-label" for="tagsInput">タグ</label>
              <input id="tagsInput" class="input" type="text" placeholder="旅, 日記, AI">
            </div>
          </div>

          <div class="field-row">
            <label class="field-label" for="keyPointsInput">重要ポイント（1行1項目）</label>
            <textarea id="keyPointsInput" class="textarea compact" placeholder="例: 出発時間は朝6時までに固定&#10;例: 雨天時はBルートへ切替"></textarea>
          </div>
        </section>

        <section class="writer">
          <div class="field-row">
            <label class="field-label" for="contentInput">本文</label>
            <div class="content-tools" role="toolbar" aria-label="本文構造ツール">
              <button id="insertChapterBtn" class="btn tool-btn" type="button">章タイトル</button>
              <button id="insertSectionBtn" class="btn tool-btn" type="button">節タイトル</button>
              <button id="insertSubSectionBtn" class="btn tool-btn" type="button">小節タイトル</button>
              <button id="insertImportantBtn" class="btn tool-btn" type="button">重要マーク</button>
              <button id="insertImageUrlBtn" class="btn tool-btn" type="button">画像URL</button>
              <button id="insertVideoUrlBtn" class="btn tool-btn" type="button">動画URL</button>
              <button id="insertMediaFileBtn" class="btn tool-btn" type="button">画像/動画ファイル</button>
              <input id="mediaFileInput" type="file" accept="image/*,video/*" multiple hidden>
            </div>
            <textarea id="contentInput" class="textarea" spellcheck="true"></textarea>
            <p class="hint">章は <code>##</code>、節は <code>###</code>、画像は <code>![説明](URL)</code>、動画は <code>@[video](URL)</code> で挿入できます。</p>
          </div>
        </section>

        <section class="preview-wrap">
          <h2>プレビュー</h2>
          <article id="preview" class="preview"></article>
        </section>
      </main>
    </div>

    <footer id="statusLine" class="status-line">準備完了</footer>
  </div>

  <div id="previewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="previewModalTitle">
    <div class="modal-panel">
      <div class="modal-head">
        <h2 id="previewModalTitle">公開前プレビュー</h2>
      </div>
      <article id="previewModalBody" class="preview modal-preview"></article>
      <div class="modal-actions">
        <button id="previewModalCancelBtn" class="btn">閉じる</button>
        <button id="previewModalConfirmBtn" class="btn primary">この内容で公開保存</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
